<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="25%" stop-color="#a8e6ff"/>
      <stop offset="55%" stop-color="#7dd4f8"/>
      <stop offset="85%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#2a6494"/>
    </linearGradient>
    <linearGradient id="core" x1="50%" y1="30%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#a8e6ff"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer flame: pointed tip, body with one side-wisp, curved base -->
  <path fill="url(#flame)" d="
    M 16 2
    C 19 6 21 10 21 14
    C 22 13 23 12 24 10
    C 25 14 25 18 24 21
    C 23 26 20 29 16 30
    C 12 29 9 26 8 21
    C 7 18 7 14 8 11
    C 9 13 10 14 11 15
    C 11 11 13 7 16 2 Z
  "/>

  <!-- Inner bright core: smaller flame -->
  <path fill="url(#core)" d="
    M 16 11
    C 17 14 19 17 18 21
    C 17 24 15 24 14 21
    C 13 17 14 14 16 11 Z
  "/>
</svg>
